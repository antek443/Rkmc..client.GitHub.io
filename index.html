<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKMC | Social Media</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://tailwindcss.com"></script>
    <!-- Font Awesome dla ikon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Animate.css dla efektów wejścia -->
    <link rel="stylesheet" href="https://cloudflare.com"/>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; }
        
        .gradient-text {
            background: linear-gradient(to right, #5865F2, #ff0050, #FF0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-sm w-full text-center">
        
        <!-- LOGO RKMC -->
        <div class="animate__animated animate__bounceInDown">
            <h1 class="text-7xl font-black tracking-tighter uppercase gradient-text mb-2">
                rkmc
            </h1>
            <p class="text-gray-400 font-medium tracking-widest text-xs uppercase mb-10">
                Oficjalne Linki
            </p>
        </div>

        <!-- PRZYCISKI -->
        <div class="space-y-4 animate__animated animate__fadeInUp animate__delay-1s">
            
            <!-- DISCORD -->
            <a href="TWÓJ_LINK" target="_blank" 
               class="flex items-center justify-center w-full py-4 px-6 bg-[#5865F2] text-white rounded-2xl font-bold shadow-lg shadow-blue-500/30 hover:scale-105 transition-transform duration-300">
                <i class="fab fa-discord text-2xl mr-3"></i>
                Discord
            </a>

            <!-- TIKTOK -->
            <a href="TWÓJ_LINK" target="_blank" 
               class="flex items-center justify-center w-full py-4 px-6 bg-black text-white rounded-2xl font-bold shadow-lg shadow-gray-500/20 hover:scale-105 transition-transform duration-300 border-x-4 border-cyan-400 border-r-pink-500">
                <i class="fab fa-tiktok text-2xl mr-3"></i>
                TikTok
            </a>

            <!-- YOUTUBE -->
            <a href="TWÓJ_LINK" target="_blank" 
               class="flex items-center justify-center w-full py-4 px-6 bg-[#FF0000] text-white rounded-2xl font-bold shadow-lg shadow-red-500/30 hover:scale-105 transition-transform duration-300">
                <i class="fab fa-youtube text-2xl mr-3"></i>
                YouTube
            </a>

        </div>

        <!-- STOPKA -->
        <footer class="mt-12 text-gray-300 text-[10px] uppercase tracking-[0.3em] animate__animated animate__fadeIn animate__delay-2s">
            &copy; 2024 RKMC Ecosystem
        </footer>

    </div>

</body>
</html>
